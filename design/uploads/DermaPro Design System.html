<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<title>DermaPro · Design System v0.1</title>
<meta name="viewport" content="width=1440"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css"/>
<style>
  .app-shell { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
  .sidebar {
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
    background: var(--neutral-0); border-right: 1px solid var(--border-subtle);
    padding: 28px 20px; display: flex; flex-direction: column; gap: 2px;
  }
  .sidebar .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; padding: 0 8px; }
  .sidebar .group-label {
    font-size: 11px; font-family: var(--ff-mono); text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--text-faint); padding: 14px 10px 6px;
    font-weight: 500;
  }
  .sidebar a {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: var(--r-sm);
    color: var(--text-muted); text-decoration: none; font-size: 14px;
    transition: background var(--dur-1) var(--ease), color var(--dur-1) var(--ease);
  }
  .sidebar a:hover { background: var(--neutral-100); color: var(--text-strong); }
  .sidebar a.active { background: var(--brand-primary-100); color: var(--brand-primary-800); font-weight: 500; }
  .main { max-width: 1200px; margin: 0 auto; padding: 48px 64px 120px; width: 100%; }

  .screen-frame {
    border: 1px solid var(--border-subtle); border-radius: var(--r-xl); overflow: hidden;
    background: var(--bg-app); box-shadow: var(--sh-md);
    position: relative;
  }
  .screen-chrome {
    padding: 10px 16px; background: var(--neutral-50); border-bottom: 1px solid var(--border-subtle);
    display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--text-muted);
    font-family: var(--ff-mono);
  }
  .screen-chrome .dot { width: 10px; height: 10px; border-radius: 50%; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="errors.jsx"></script>
<script type="text/babel" src="comparison.jsx"></script>
<script type="text/babel" src="ds-sections.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

/* TWEAKS */
const TWEAKS = /*EDITMODE-BEGIN*/{
  "tvMode": false,
  "showDisclaimer": false
}/*EDITMODE-END*/;

function ScreenFrame({ label, children, height = 860 }) {
  return (
    <div style={{ marginBottom: 16 }}>
      <div className="screen-frame" style={{ height }}>
        <div className="screen-chrome">
          <span className="dot" style={{ background: 'oklch(0.78 0.09 30)' }}/>
          <span className="dot" style={{ background: 'oklch(0.85 0.10 90)' }}/>
          <span className="dot" style={{ background: 'oklch(0.75 0.08 140)' }}/>
          <span style={{ marginLeft: 8 }}>{label}</span>
        </div>
        <div style={{ height: `calc(100% - 35px)`, overflow: 'auto', position: 'relative' }}>
          {children}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [active, setActive] = useState('overview');
  const [tvMode, setTvMode] = useState(TWEAKS.tvMode);
  const [showDisclaimer, setShowDisclaimer] = useState(false);
  const [currentModule, setCurrentModule] = useState('acne');
  const [presenting, setPresenting] = useState(false);
  const [analysisModule, setAnalysisModule] = useState('acne');
  const [uploadState, setUploadState] = useState(false); // false = with result

  // edit mode wiring
  useEffect(() => {
    function onMsg(e) {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') document.getElementById('tweaks-panel')?.style.setProperty('display', 'block');
      if (e.data.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel')?.style.setProperty('display', 'none');
    }
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  // Scroll spy
  useEffect(() => {
    const sections = ['overview', 'logo', 'colors', 'type', 'geometry', 'voice', 'icons', 'components', 'dark', 'capture-errors', 'screen-hub', 'screen-analysis', 'screen-upload', 'comparison', 'screen-disclaimer', 'screen-presentation'];
    const obs = new IntersectionObserver(entries => {
      entries.forEach(en => { if (en.isIntersecting) setActive(en.target.id); });
    }, { rootMargin: '-40% 0px -50% 0px' });
    sections.forEach(id => { const el = document.getElementById(id); if (el) obs.observe(el); });
    return () => obs.disconnect();
  }, []);

  const nav = [
    { group: 'Fundamentos', items: [
      ['overview', 'Visão geral'],
      ['logo', 'Logo'],
      ['colors', 'Paleta'],
      ['type', 'Tipografia'],
      ['geometry', 'Espaçamento'],
      ['voice', 'Voz e tom'],
    ]},
    { group: 'Componentes', items: [
      ['icons', 'Iconografia'],
      ['components', 'Botões, badges, gráficos'],
      ['dark', 'Variantes escuras'],
      ['capture-errors', 'Erros de captura'],
    ]},
    { group: 'Telas', items: [
      ['screen-hub', 'Hub'],
      ['screen-analysis', 'Análise (com resultado)'],
      ['screen-upload', 'Análise (upload)'],
      ['comparison', 'Comparação (timeline)'],
      ['screen-disclaimer', 'Modal de disclaimer'],
      ['screen-presentation', 'Modo apresentação'],
    ]},
  ];

  return (
    <div className="app-shell">
      <aside className="sidebar">
        <div className="brand">
          <DermaProLogo size={24} color="var(--brand-primary-800)"/>
        </div>
        <a href="#overview" className={active === 'overview' ? 'active' : ''}>Visão geral</a>
        {nav.map(g => (
          <div key={g.group}>
            <div className="group-label">{g.group}</div>
            {g.items.map(([id, label]) => (
              <a key={id} href={`#${id}`} className={active === id ? 'active' : ''}>{label}</a>
            ))}
          </div>
        ))}
        <div style={{ flex: 1 }}/>
        <div style={{ padding: '12px 10px', fontSize: 11, color: 'var(--text-faint)', fontFamily: 'var(--ff-mono)' }}>
          v0.1 · 17 Abr 2026
        </div>
      </aside>

      <main className="main">
        <DSOverview/>
        <DSLogo/>
        <DSColors/>
        <DSType/>
        <DSGeometry/>
        <DSVoice/>
        <DSIcons/>
        <DSComponents/>
        <DSDark/>
        <DSCaptureErrors/>

        <DSSection id="screen-hub" eyebrow="Telas-chave" title="Hub">
          <p style={{ fontSize: 15, color: 'var(--text-muted)', maxWidth: 700, marginTop: -16, marginBottom: 20 }}>
            Tela de entrada da consulta. Grid 3×2 com 4 módulos ativos e 2 esmaecidos (“Em breve”). Cada card carrega a cor-identidade do módulo na borda lateral.
          </p>
          <ScreenFrame label="/hub · 1440×860" height={860}>
            <HubScreen tvMode={tvMode} onOpenModule={(id) => { setAnalysisModule(id); setUploadState(false); document.getElementById('screen-analysis')?.scrollIntoView({behavior: 'smooth'}); }}/>
          </ScreenFrame>
        </DSSection>

        <DSSection id="screen-analysis" eyebrow="Telas-chave" title="Página de módulo — com resultado">
          <p style={{ fontSize: 15, color: 'var(--text-muted)', maxWidth: 700, marginTop: -16, marginBottom: 20 }}>
            Header com breadcrumb e título marcado pela cor do módulo. Imagem com overlays semitransparentes à esquerda; painel de métricas à direita (classificação + distribuição + stats).
          </p>
          <div style={{ display: 'flex', gap: 10, marginBottom: 14, flexWrap: 'wrap' }}>
            {['acne', 'melasma', 'textura', 'expression'].map(id => (
              <button key={id} onClick={() => setAnalysisModule(id)} style={{
                border: '1px solid var(--border-subtle)', background: analysisModule === id ? `var(--mod-${id}-soft)` : 'var(--neutral-0)',
                color: analysisModule === id ? `var(--mod-${id})` : 'var(--text-body)', fontWeight: analysisModule === id ? 500 : 400,
                padding: '6px 14px', borderRadius: 'var(--r-pill)', cursor: 'pointer', fontSize: 13,
                fontFamily: 'var(--ff-sans)', display: 'inline-flex', alignItems: 'center', gap: 8,
              }}>
                <span style={{ width: 8, height: 8, borderRadius: 2, background: `var(--mod-${id})`, display: 'inline-block' }}/>
                {MODULES.find(m => m.id === id).name}
              </button>
            ))}
          </div>
          <ScreenFrame label={`/analise/${analysisModule} · 1440×900`} height={900}>
            <AnalysisScreen moduleId={analysisModule} hasResult={true} tvMode={tvMode}
              onBack={() => {}} onPresent={() => { setCurrentModule(analysisModule); setPresenting(true); document.getElementById('screen-presentation')?.scrollIntoView({behavior: 'smooth'}); }}/>
          </ScreenFrame>
        </DSSection>

        <DSSection id="screen-upload" eyebrow="Telas-chave" title="Página de módulo — upload inicial">
          <ScreenFrame label={`/analise/${analysisModule}/novo · 1440×720`} height={720}>
            <AnalysisScreen moduleId={analysisModule} hasResult={false} tvMode={tvMode} onBack={() => {}} onPresent={() => {}}/>
          </ScreenFrame>
        </DSSection>

        <DSComparison/>

        <DSSection id="screen-disclaimer" eyebrow="Telas-chave" title="Modal de disclaimer (primeiro uso)">
          <p style={{ fontSize: 15, color: 'var(--text-muted)', maxWidth: 700, marginTop: -16, marginBottom: 20 }}>
            Aparece uma única vez por dispositivo. Enquadra o DermaPro como apoio, não substituto do julgamento clínico.
          </p>
          <ScreenFrame label="Disclaimer · overlay" height={640}>
            <div style={{ position: 'absolute', inset: 0, background: 'var(--bg-app)' }}>
              <div style={{ padding: 32, opacity: 0.4, filter: 'blur(1px)' }}>
                <HubScreen tvMode={false} onOpenModule={() => {}}/>
              </div>
              <DisclaimerModal embedded onAccept={() => {}} onClose={() => {}}/>
            </div>
          </ScreenFrame>
        </DSSection>

        <DSSection id="screen-presentation" eyebrow="Telas-chave" title="Modo apresentação (Apple TV)">
          <p style={{ fontSize: 15, color: 'var(--text-muted)', maxWidth: 700, marginTop: -16, marginBottom: 20 }}>
            Fullscreen, fundo escuro, tipografia amplificada. Pensado para que o paciente enxergue o resultado-chave a 3 metros de distância.
          </p>
          <ScreenFrame label={`Apresentação · ${analysisModule} · 1920×1080`} height={900}>
            <PresentationMode moduleId={analysisModule} onExit={() => {}}/>
          </ScreenFrame>
        </DSSection>

        <DSSection id="next" eyebrow="Próximos passos" title="A refinar">
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 12 }}>
            {[
              'Definir iconografia completa (sistema de 24 ícones line-icons).',
              'Desenhar estados de erro de captura (foto borrada, rosto parcialmente fora).',
              'Variantes escuras dos componentes para Modo Apresentação.',
              'Timeline de consulta anterior × atual (comparação lado a lado).',
              'Fluxo do consentimento LGPD antes do upload.',
              'Padrões de impressão / export PDF para o paciente levar.',
            ].map((t, i) => (
              <div key={i} style={{ padding: 16, border: '1px dashed var(--border-default)', borderRadius: 'var(--r-md)', fontSize: 14, color: 'var(--text-body)', display: 'flex', gap: 12 }}>
                <span style={{ fontFamily: 'var(--ff-mono)', color: 'var(--text-faint)', fontSize: 12 }}>0{i+1}</span>
                {t}
              </div>
            ))}
          </div>
        </DSSection>
      </main>

      {/* Tweaks panel */}
      <div id="tweaks-panel" style={{
        display: 'none', position: 'fixed', bottom: 20, right: 20, zIndex: 9999,
        background: 'var(--neutral-0)', border: '1px solid var(--border-subtle)',
        borderRadius: 'var(--r-lg)', boxShadow: 'var(--sh-xl)', padding: 20, width: 260,
      }}>
        <div style={{ fontSize: 11, fontFamily: 'var(--ff-mono)', textTransform: 'uppercase', letterSpacing: '0.1em', color: 'var(--text-faint)', marginBottom: 12, fontWeight: 500 }}>Tweaks</div>
        <label style={{ display: 'flex', alignItems: 'center', gap: 10, fontSize: 14, color: 'var(--text-body)', marginBottom: 12, cursor: 'pointer' }}>
          <input type="checkbox" checked={tvMode} onChange={e => {
            setTvMode(e.target.checked);
            window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { tvMode: e.target.checked } }, '*');
          }}/>
          Modo TV (tipografia ampliada)
        </label>
        <div style={{ fontSize: 12, color: 'var(--text-muted)', lineHeight: 1.4 }}>
          Usado nas telas Hub e Análise quando o espelhamento em Apple TV é detectado.
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
